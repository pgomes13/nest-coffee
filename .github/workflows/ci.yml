name: API Drift Check

on:
  pull_request:

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: API drift check
        run: |
          drift-guard compare openapi \
            --cmd "swag init" \
            --output docs/swagger.yaml \
            --format github \
            --fail-on-breaking
