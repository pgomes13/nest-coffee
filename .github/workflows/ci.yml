name: API Drift Check

on:
  pull_request:

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Install drift-guard
        run: go install github.com/pgomes13/drift-guard-engine/cmd/drift-guard@v1.1.1

      - name: API drift check
        run: |
          drift-guard compare openapi \
            --cmd "swag init" \
            --output docs/swagger.yaml \
            --format github \
            --fail-on-breaking
