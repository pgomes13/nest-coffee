name: API Drift Check

on:
  pull_request:

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate head schema
        run: go run ./cmd/generate-schema --out /tmp/head.yaml

      - name: Generate base schema from main
        run: |
          git stash
          git checkout origin/main
          go run ./cmd/generate-schema --out /tmp/base.yaml
          git checkout -

      - name: Install drift-guard
        run: |
          brew tap pgomes13/tap
          brew install drift-guard

      - name: API drift check
        run: |
          drift-guard openapi \
            --base /tmp/base.yaml \
            --head /tmp/head.yaml \
            --format github \
            --fail-on-breaking
