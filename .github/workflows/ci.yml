name: API Drift Check

on:
  pull_request:

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install driftengine
        run: go install github.com/pgomes13/driftengine-engine/cmd/driftengine@latest

      - name: OpenAPI drift check
        run: |
          driftengine openapi \
            --base api/base.yaml \
            --head api/head.yaml \
            --format github \
            --fail-on-breaking

      - name: GraphQL drift check
        run: |
          driftengine graphql \
            --base schema/base.graphql \
            --head schema/head.graphql \
            --format github \
            --fail-on-breaking
